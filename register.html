<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистриция</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="authorization/register-style.css">
</head>
<body>
    <div class="cont">
        <h1>Регистрация</h1>
        <form action="authorization/register.php" method="post">
            <label>
                Ваш логин
                <input type="text" name="login" placeholder="Name" required>
            </label>
            <label>
                Почта
                <input type="email" name="mail" placeholder="Example@mail.com">
            </label>
            <label>
                Почта
                <input type="password" name="pass" placeholder="Пароль" required>
            </label>
            <label>
                Подтверждение парорля
                <input type="password" name="conf-pass" placeholder="Подтверждение парорля" required>
            </label>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <div class="register-cont"><p>Уже регистрировались? <a href="./login.html">Войти</a></p></div>
    </div>
</body>
</html>
